  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier Prime','Courier New',monospace;font-size:9.5px;line-height:1.85;color:#1a1814;">Per decenni, il gioco da tavolo italiano ha avuto un nome: Editrice Giochi. Fondata a Milano, è stata l'editore che ha portato nelle case italiane i giochi più amati — da Rischiatutto a Subbuteo, dalle grandi licenze Disney e RAI ai prototipi dei migliori designer internazionali.<br/><br/>
Poi, come accade alle cose importanti, il tempo ha fatto il suo lavoro. L'azienda ha cambiato forma, i cataloghi sono stati trasferiti. Plance originali, prototipi, corrispondenze con i game designer, bozze di regolamenti: tutto in un magazzino.<br/><br/>
A un certo punto quel magazzino è stato affidato a Spartaco Albertarelli. Poteva andare perduto. Non è andata così.</div>
