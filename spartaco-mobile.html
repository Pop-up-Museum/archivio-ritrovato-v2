  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier Prime','Courier New',monospace;font-size:15px;line-height:1.85;color:#1a1814;">Spartaco Albertarelli gioca. Per piacere, per mestiere, per curiosità. Osserva come funzionano le cose, pensa alle regole, inventa meccaniche. Da oltre trent'anni progetta giochi da tavolo — centinaia di titoli, collaborazioni con i principali editori europei.<br/><br/>
In questa storia si presenta in una veste nuova: l'archivista. Quello che ha salvato il magazzino dell'Editrice Giochi non lo ha fatto per dovere. Lo ha fatto perché sa cosa vale.</div>
