  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier Prime','Courier New',monospace;font-size:15px;line-height:1.85;color:#1a1814;">L'archivio di Spartaco Albertarelli è nei suoi garage.<br/><br/>
Migliaia di giochi, prototipi, documenti, corrispondenze — una delle collezioni più importanti della storia del gioco da tavolo italiano, custodita in attesa di trovare casa.<br/><br/>
Il progetto è semplice da dire e complesso da fare: trovare un luogo permanente in grado di accogliere questa memoria e renderla accessibile al pubblico. Non un deposito, ma uno spazio vivo — dove i giochi si vedono, si studiano, si giocano.</div>
</foreignObject>
