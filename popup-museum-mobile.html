  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier Prime','Courier New',monospace;font-size:15px;line-height:1.85;color:#1a1814;">Prima di trovare una casa definitiva, l'archivio esce allo scoperto.<br/><br/>
Cinque serate all'ADI Design Museum di Milano, da luglio a settembre 2026. Ogni appuntamento esplora un tema — il calcio, la televisione, le grandi licenze, i prototipi, la guerra — con i giochi originali dell'archivio disponibili sui tavoli, i materiali consultabili liberamente, e Spartaco Albertarelli a raccontare.<br/><br/>
L'ADI Design Museum è il luogo giusto: perché il gioco da tavolo è design, e perché è il posto dove il design italiano si conserva e si racconta.<br/><br/>
Ingresso libero. Ogni lunedì, dalle 18 alle 21.</div>
