    Spartaco Albertarelli gioca. Per piacere, per mestiere, per curiosità. Osserva come funzionano le cose, pensa alle regole, inventa meccaniche. Da oltre trent'anni progetta giochi da tavolo — centinaia di titoli, collaborazioni con i principali editori europei.<br/><br/>
    In questa storia si presenta in una veste nuova: l'archivista. Quello che ha salvato il magazzino dell'Editrice Giochi non lo ha fatto per dovere. Lo ha fatto perché sa cosa vale.
  </div>
</foreignObject>
