    Spartaco Albertarelli è nato a Milano nel 1963. Ha lavorato per oltre trent'anni nell'industria del gioco da tavolo italiano, collaborando con i principali editori europei e firmando titoli pubblicati in tutto il mondo.<br/><br/>
    Nel 1987 approda in Editrice Giochi, di cui diventa Direttore dell'Ufficio Ricerca e Sviluppo, ed è responsabile dello sviluppo del brand RisiKo!. Nell'arco della sua carriera ultratrentennale ha pubblicato oltre 150 giochi per adulti e bambini, molti dei quali distribuiti da editori internazionali come Ravensburger, Fantasy Flight, Asmodee e Gigamic.<br/><br/>
    Nel 1995 il suo gioco Kaleidos entra nella lista dei candidati allo Spiel des Jahres e vince l'As d'Or in Francia. Nel 2012 fonda KaleidosGames.<br/><br/>
    È tra i massimi esperti e storici del gioco da tavolo italiano — ed è il custode dell'archivio straordinario attorno a cui nasce questo progetto.
  </div>
