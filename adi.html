  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11.5px;line-height:1.85;color:#2c1810;">L'ADI Design Museum è il museo del design italiano. Ospita la collezione storica del Compasso d'Oro — il premio più antico e autorevole del design internazionale — e racconta come gli oggetti italiani abbiano cambiato il modo di pensare la produzione, la forma, l'uso delle cose.<br/><br/>
È il luogo naturale per l'archivio ritrovato. Perché il gioco da tavolo è un oggetto progettato — ha una grafica, dei materiali, un packaging, un processo. È design. E come tale appartiene a questo museo.</div>
