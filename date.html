<foreignObject x="196" y="324" width="288" height="106"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:10.5px;line-height:1.75;color:#4a3420;">L'estate 2026 è l'estate del Campionato del Mondo di calcio. L'Italia non gioca — e allora giochiamo noi, a modo nostro. La plancia come mappa, come territorio, come sistema di regole visive.</div></foreignObject>

<text x="250" y="488" font-family="Courier New" font-size="6.5" fill="#8a7a6a">Rischiatutto e i giochi televisivi</text>
<foreignObject x="196" y="500" width="288" height="106"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:10.5px;line-height:1.75;color:#4a3420;">I giochi ispirati alla televisione sono stati i più venduti della storia dell'Editrice Giochi. Come si costruisce l'identità visiva di un gioco a partire da un'immagine già nota a tutti.</div></foreignObject>

<text x="250" y="840" font-family="Courier New" font-size="6.5" fill="#8a7a6a">I prototipi di Alex Randolph</text>
<foreignObject x="196" y="852" width="288" height="106"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:10.5px;line-height:1.75;color:#4a3420;">Prima che un gioco esista, esiste un prototipo. Spartaco Albertarelli conserva una collezione unica di prototipi di Alex Randolph — mai mostrati al pubblico. Una serata sul processo, sull'errore, sull'idea prima che diventi prodotto.</div></foreignObject>

<text x="250" y="1016" font-family="Courier New" font-size="6.5" fill="#8a7a6a">Risiko</text>
