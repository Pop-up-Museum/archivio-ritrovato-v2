<text x="80" y="340" font-family="Courier New" font-size="8" fill="#8a7a6a">LUGLIO</text>
<rect x="530" y="284" width="74" height="16" fill="none" stroke="#c8b890" stroke-width="0.7" rx="1"/>
<text x="567" y="295" font-family="Courier New" font-size="8" fill="#8a7a6a" text-anchor="middle" letter-spacing="1">APERTURA</text>
<text x="140" y="298" font-family="Courier New" font-size="8" fill="#8b3a1c" letter-spacing="2">IL CALCIO</text>
<text x="140" y="318" font-family="Playfair Display, serif" font-size="16" font-style="italic" fill="#1a1814">Le plance</text>
<text x="140" y="332" font-family="Courier New" font-size="8" fill="#8a7a6a">Giochi di riferimento: Subbuteo e i giochi sportivi</text>
<foreignObject x="140" y="340" width="464" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11px;line-height:1.7;color:#4a3420;">L'estate 2026 è l'estate del Campionato del Mondo di calcio. L'Italia non gioca — e allora giochiamo noi, a modo nostro. Il calcio è il tema più giocato della storia del gioco da tavolo italiano. La plancia come mappa, come territorio, come sistema di regole visive.</div></foreignObject>
<line x1="76" y1="444" x2="604" y2="444" stroke="#c8b890" stroke-width="0.6"/>
<text x="80" y="496" font-family="Playfair Display, serif" font-size="38" font-weight="700" fill="#1a1814">13</text>
<text x="80" y="510" font-family="Courier New" font-size="8" fill="#8a7a6a">LUGLIO</text>
<rect x="530" y="454" width="74" height="16" fill="none" stroke="#c8b890" stroke-width="0.7" rx="1"/>
<text x="567" y="465" font-family="Courier New" font-size="8" fill="#8a7a6a" text-anchor="middle" letter-spacing="1">SERATA II</text>
<text x="140" y="468" font-family="Courier New" font-size="8" fill="#8b3a1c" letter-spacing="2">LA TELEVISIONE</text>
<text x="140" y="488" font-family="Playfair Display, serif" font-size="16" font-style="italic" fill="#1a1814">Identità visiva</text>
<text x="140" y="502" font-family="Courier New" font-size="8" fill="#8a7a6a">Giochi di riferimento: Rischiatutto e i giochi televisivi</text>
<foreignObject x="140" y="510" width="464" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11px;line-height:1.7;color:#4a3420;">I giochi ispirati alla televisione sono stati i più venduti della storia dell'Editrice Giochi. La televisione portava i personaggi nelle case, il gioco da tavolo li metteva sul tavolo. Come si costruisce l'identità visiva di un gioco a partire da un'immagine già nota a tutti.</div></foreignObject>

<rect x="530" y="624" width="74" height="16" fill="none" stroke="#c8b890" stroke-width="0.7" rx="1"/>
<text x="567" y="635" font-family="Courier New" font-size="8" fill="#8a7a6a" text-anchor="middle" letter-spacing="1">SERATA III</text>
<text x="140" y="638" font-family="Courier New" font-size="8" fill="#8b3a1c" letter-spacing="2">LE GRANDI LICENZE</text>
<text x="140" y="658" font-family="Playfair Display, serif" font-size="16" font-style="italic" fill="#1a1814">Il packaging</text>
<text x="140" y="672" font-family="Courier New" font-size="8" fill="#8a7a6a">Gioco di riferimento: Colpo grosso a Topolinia</text>
<foreignObject x="140" y="680" width="464" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11px;line-height:1.7;color:#4a3420;">Disney, Warner, Rai, Fininvest — le grandi licenze hanno prodotto alcuni degli oggetti graficamente più straordinari della storia del gioco da tavolo italiano. Una serata sul packaging come forma di seduzione, sulla scatola come promessa.</div></foreignObject>
<line x1="76" y1="784" x2="604" y2="784" stroke="#c8b890" stroke-width="0.6"/>
<text x="80" y="836" font-family="Playfair Display, serif" font-size="38" font-weight="700" fill="#1a1814">27</text>
<text x="80" y="850" font-family="Courier New" font-size="8" fill="#8a7a6a">LUGLIO</text>
<rect x="530" y="794" width="74" height="16" fill="none" stroke="#c8b890" stroke-width="0.7" rx="1"/>
<text x="567" y="805" font-family="Courier New" font-size="8" fill="#8a7a6a" text-anchor="middle" letter-spacing="1">SERATA IV</text>
<text x="140" y="808" font-family="Courier New" font-size="8" fill="#8b3a1c" letter-spacing="2">I PROTOTIPI</text>
<text x="140" y="828" font-family="Playfair Display, serif" font-size="16" font-style="italic" fill="#1a1814">Il processo</text>
<text x="140" y="842" font-family="Courier New" font-size="8" fill="#8a7a6a">Gioco di riferimento: i prototipi di Alex Randolph</text>
<foreignObject x="140" y="850" width="464" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11px;line-height:1.7;color:#4a3420;">Prima che un gioco esista, esiste un prototipo. Spartaco Albertarelli conserva una collezione unica di prototipi di Alex Randolph — uno dei più grandi game designer della storia — mai mostrati al pubblico. Una serata sul processo, sull'errore, sull'idea prima che diventi prodotto.</div></foreignObject>
<line x1="76" y1="954" x2="604" y2="954" stroke="#c8b890" stroke-width="0.6"/>
<text x="80" y="1006" font-family="Playfair Display, serif" font-size="38" font-weight="700" fill="#1a1814">22</text>
<text x="80" y="1020" font-family="Courier New" font-size="8" fill="#8a7a6a">SETTEMBRE</text>
<rect x="530" y="964" width="74" height="16" fill="none" stroke="#c8b890" stroke-width="0.7" rx="1"/>
<text x="567" y="975" font-family="Courier New" font-size="8" fill="#8a7a6a" text-anchor="middle" letter-spacing="1">FINALE</text>
<text x="140" y="978" font-family="Courier New" font-size="8" fill="#8b3a1c" letter-spacing="2">I GIOCHI DI GUERRA</text>
<text x="140" y="998" font-family="Playfair Display, serif" font-size="16" font-style="italic" fill="#1a1814">Le cartografie</text>
<text x="140" y="1012" font-family="Courier New" font-size="8" fill="#8a7a6a">Gioco di riferimento: Risiko</text>
<foreignObject x="140" y="1020" width="464" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:11px;line-height:1.7;color:#4a3420;">La guerra è il tema più antico del gioco da tavolo. Dagli scacchi ai wargame, dal Risiko ai giochi di simulazione storica, il conflitto ha generato alcune delle rappresentazioni cartografiche più affascinanti della storia del gioco. In collaborazione con Spin Master.</div></foreignObject>
