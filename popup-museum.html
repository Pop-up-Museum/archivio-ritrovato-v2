  <foreignObject x="78" y="346" width="524" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:13px;line-height:1.8;color:#2c1810;">
      Il gioco da tavolo è un oggetto progettato. Ha una grafica, dei materiali, una storia editoriale e culturale. È un documento del suo tempo, e come tale appartiene al design. L'archivio ritrovato nasce da una scoperta: un patrimonio straordinario dell'Editrice Giochi che sembrava perduto e che Spartaco Albertarelli ha ritrovato, recuperato e portato alla luce. Per la prima volta questo archivio diventa accessibile al pubblico, nella sede naturale dell'ADI Design Museum di Milano.
    </div>
  </foreignObject>
