<foreignObject x="198" y="336" width="284" height="420">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Courier Prime','Courier New',monospace;font-size:9.5px;line-height:1.85;color:#1a1814;">Stefano Mirti è designer, educatore, curatore. Da vent'anni lavora all'intersezione tra progetto, cultura e didattica. In questo progetto porta lo sguardo del design: su cosa significa conservare, esporre, raccontare un archivio di oggetti progettati.<br/><br/>
Luca Carannante si occupa di comunicazione visiva. Cura l'identità del progetto, il sito, tutto quello che si vede.<br/><br/>
Spartaco sa tutto di giochi. Stefano sa di design. Luca fa in modo che si veda.<br/><br/>
Il lavoro di Stefano e Luca è il contributo di ACME — Accademia di Belle Arti — al progetto. Perché un archivio di oggetti progettati è anche un archivio didattico: il posto giusto per chi impara a guardare le cose.</div>
